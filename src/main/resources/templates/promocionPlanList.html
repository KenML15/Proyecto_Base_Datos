<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Promociones-Planes · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-link-45deg"></i></span> Gestión de Promociones-Planes</h2>
            <p class="page-subtitle">Vincula promociones con planes tarifarios.</p>
        </div>
        <a href="/promociones-planes/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Relación</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Promoción</th>
                    <th>Plan</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="pp : ${promocionesPlanes}">
                    <td><span class="chip chip-pink"><i class="bi bi-gift-fill"></i> <span th:text="${pp.promocion.nombre}"></span></span></td>
                    <td><span class="chip chip-violet"><i class="bi bi-grid-3x3-gap"></i> <span th:text="${pp.plan.nombre}"></span></span></td>
                    <td>
                        <span class="status-badge" th:classappend="${pp.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${pp.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/promociones-planes/edit/{codPromocion}/{codPlan}(codPromocion=${pp.promocion.codPromocion}, codPlan=${pp.plan.codPlan})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/promociones-planes/delete/{codPromocion}/{codPlan}(codPromocion=${pp.promocion.codPromocion}, codPlan=${pp.plan.codPlan})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta relación?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${promocionesPlanes.empty}">
                    <td colspan="4">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay relaciones registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
