<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Categoría · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-tags-fill"></i></span> Datos de Categoría de Plan</h2>
            <p class="page-subtitle">Define el nivel de servicio y la velocidad asociada a la categoría.</p>
        </div>
    </div>

    <form th:action="@{/categorias/save}" th:object="${categoria}" method="post" class="l360-card form-card">

        <input type="hidden" th:field="*{codCategoria}" />

        <div class="mb-3" th:if="${categoria.codCategoria != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Categoría</label>
            <input type="text" th:value="${categoria.codCategoria}" class="form-control" readonly disabled />
        </div>

        <div class="mb-3" th:if="${categoria.codCategoria == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Categoría (Automático)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Descripción *</label>
            <input type="text" th:field="*{descripcion}" class="form-control" required/>
            <small class="form-text">Ej: Plan Básico, Plan Profesional, Plan Premium</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-speedometer2"></i> Velocidad Máxima *</label>
            <input type="text" th:field="*{velocidadMaxima}" class="form-control" required/>
            <small class="form-text">Ej: 4G, 5G, LTE, HSPA+</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Categoría</button>
            <a href="/categorias" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
