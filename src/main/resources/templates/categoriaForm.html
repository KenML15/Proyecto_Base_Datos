<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Categoría de Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Datos de Categoría de Plan</h2>

<form th:action="@{/categorias/save}" th:object="${categoria}" method="post" class="card p-4 shadow-sm">

    <input type="hidden" th:field="*{codCategoria}" />

    <div class="mb-3" th:if="${categoria.codCategoria != null}">
        <label class="form-label text-muted">ID de Categoría</label>
        <input type="text" th:value="${categoria.codCategoria}" class="form-control" readonly disabled />
    </div>

    <div class="mb-3" th:if="${categoria.codCategoria == null}">
        <label class="form-label">ID de Categoría (Automático)</label>
        <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción *</label>
        <input type="text" th:field="*{descripcion}" class="form-control" required/>
        <small class="form-text text-muted">Ej: Plan Básico, Plan Profesional, Plan Premium</small>
    </div>

    <div class="mb-3">
        <label class="form-label">Velocidad Máxima *</label>
        <input type="text" th:field="*{velocidadMaxima}" class="form-control" required/>
        <small class="form-text text-muted">Ej: 4G, 5G, LTE, HSPA+</small>
    </div>

    <div class="mb-3">
        <label class="form-label">Estado</label>
        <select th:field="*{status}" class="form-control" required>
            <option value="A">Activo</option>
            <option value="I">Inactivo</option>
        </select>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Guardar Categoría</button>
        <a href="/categorias" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
