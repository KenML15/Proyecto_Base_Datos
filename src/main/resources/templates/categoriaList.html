<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categorías de Plan · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-tags-fill"></i></span> Gestión de Categorías de Planes</h2>
            <p class="page-subtitle">Clasifica los planes tarifarios según su velocidad y nivel de servicio.</p>
        </div>
        <a href="/categorias/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Categoría</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Velocidad Máxima</th>
                    <th>Estado</th>
                    <th>Creado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categorias}">
                    <td class="mono" th:text="${cat.codCategoria}"></td>
                    <td th:text="${cat.descripcion}"></td>
                    <td><span class="chip chip-cyan"><i class="bi bi-speedometer2"></i> <span th:text="${cat.velocidadMaxima}"></span></span></td>
                    <td>
                        <span class="status-badge" th:classappend="${cat.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${cat.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td class="mono" th:text="${#temporals.format(cat.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/categorias/edit/{id}(id=${cat.codCategoria})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/categorias/delete/{id}(id=${cat.codCategoria})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta categoría?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${categorias.empty}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay categorías registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
