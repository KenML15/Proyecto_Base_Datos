<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías de Planes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Categorías de Planes</h2>
        <a href="/categorias/new" class="btn btn-primary">Nueva Categoría</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Velocidad Máxima</th>
                <th>Estado</th>
                <th>Creado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.codCategoria}"></td>
                <td th:text="${cat.descripcion}"></td>
                <td th:text="${cat.velocidadMaxima}"></td>
                <td>
                    <span th:classappend="${cat.status == 'A' ? 'badge bg-success' : 'badge bg-secondary'}"
                          th:text="${cat.status == 'A' ? 'Activo' : 'Inactivo'}">
                    </span>
                </td>
                <td th:text="${#temporals.format(cat.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/categorias/edit/{id}(id=${cat.codCategoria})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/categorias/delete/{id}(id=${cat.codCategoria})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar esta categoría?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${categorias.empty}">
                <td colspan="6" class="text-center">No hay categorías registradas actualmente.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
