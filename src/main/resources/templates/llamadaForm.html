<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Formulario de Llamada · Link360</title>
  <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
  <div class="page-header">
    <div>
      <h2><span class="page-header-icon"><i class="bi bi-telephone-fill"></i></span> Datos de la Llamada</h2>
      <p class="page-subtitle">Registra los detalles de una llamada realizada.</p>
    </div>
  </div>

  <form th:action="@{/llamadas/save}" th:object="${llamada}" method="post" class="l360-card form-card">

    <input type="hidden" th:field="*{idConsumo}" />

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-graph-up"></i> Consumo *</label>
      <select th:field="*{consumo}" class="form-control" required>
        <option value="" disabled selected>Seleccione un consumo...</option>
        <option th:each="c : ${consumos}"
                th:value="${c.idConsumo}"
                th:text="${'ID: ' + c.idConsumo + ' - ' + c.lineaMovil.numeroTelefono}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-telephone"></i> Número de Destino *</label>
      <input type="tel" th:field="*{numeroDestino}" class="form-control" placeholder="Ej: +34912345678" required/>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-tag"></i> Tipo de Llamada *</label>
      <select th:field="*{tipoLlamada}" class="form-control" required>
        <option value="" disabled selected>Seleccione tipo...</option>
        <option value="Local">Local</option>
        <option value="Nacional">Nacional</option>
        <option value="Internacional">Internacional</option>
        <option value="Móvil">Móvil</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-cash-coin"></i> Costo *</label>
      <input type="number" th:field="*{costo}" class="form-control" step="0.01" min="0" required/>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha/Hora Inicial *</label>
      <input type="datetime-local" th:field="*{fechaInicial}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-clock-history"></i> Franja Horaria *</label>
      <select th:field="*{franjaHoraria}" class="form-control" required>
        <option value="" disabled selected>Seleccione una franja...</option>
        <option th:each="f : ${franjas}"
                th:value="${f.idFranja}"
                th:text="${f.descripcion + ' (' + #temporals.format(f.horaInicio, 'HH:mm') + ' - ' + #temporals.format(f.horaFin, 'HH:mm') + ')'}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
      <select th:field="*{status}" class="form-control" required>
        <option value="A">Activo</option>
        <option value="I">Inactivo</option>
      </select>
    </div>

    <div class="d-grid gap-2 mt-4">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Llamada</button>
      <a href="/llamadas" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
    </div>
  </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
