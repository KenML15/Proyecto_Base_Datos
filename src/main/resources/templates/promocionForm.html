<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Promoción · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-gift-fill"></i></span> Datos de Promoción</h2>
            <p class="page-subtitle">Define los detalles de una promoción con descuento.</p>
        </div>
    </div>

    <form th:action="@{/promociones/save}" th:object="${promocion}" method="post" class="l360-card form-card">

        <input type="hidden" th:field="*{codPromocion}"/>

        <div class="mb-3" th:if="${promocion.codPromocion != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Código de Promoción</label>
            <input type="text" th:value="${promocion.codPromocion}" class="form-control" readonly disabled/>
        </div>

        <div class="mb-3" th:if="${promocion.codPromocion == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Código de Promoción (Automático)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente"/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Nombre *</label>
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Black Friday 2024" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-file-text"></i> Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3"
                      placeholder="Detalles de la promoción..."></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-percent"></i> Porcentaje de Descuento *</label>
            <input type="number" th:field="*{porcentajeDescuento}" class="form-control" step="0.01" min="0" max="100"
                   required/>
            <small class="form-text">De 0 a 100</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha de Inicio *</label>
            <input type="date" th:field="*{fechaInicio}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha de Fin *</label>
            <input type="date" th:field="*{fechaFin}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Promoción</button>
            <a href="/promociones" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
