<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Detalle de Factura · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-list-check"></i></span> Datos de Detalle de Factura</h2>
            <p class="page-subtitle">Registra un detalle (línea) en una factura.</p>
        </div>
    </div>

    <form th:action="@{/detalles-facturas/save}" th:object="${detalle}" method="post" class="l360-card form-card">

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-receipt-fill"></i> Factura *</label>
            <select th:field="*{factura}" class="form-control" required>
                <option value="" disabled selected>Seleccione una factura...</option>
                <option th:each="f : ${facturas}"
                        th:value="${f.numFactura}"
                        th:text="${'Factura ' + f.numFactura + ' - ' + f.cliente.nombre + ' ' + f.cliente.apellido1}">
                </option>
            </select>
        </div>

        <div class="mb-3" th:if="${detalle.idLineaDetalle != null}">
            <label class="form-label"><i class="bi bi-list-ul"></i> Línea Detalle</label>
            <input type="text" th:value="${detalle.idLineaDetalle}" class="form-control" readonly disabled />
            <input type="hidden" th:field="*{idLineaDetalle}" />
        </div>

        <div class="mb-3" th:if="${detalle.idLineaDetalle == null}">
            <label class="form-label"><i class="bi bi-list-ul"></i> Línea Detalle (Automática)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-graph-up"></i> Consumo *</label>
            <select th:field="*{consumo}" class="form-control" required>
                <option value="" disabled selected>Seleccione un consumo...</option>
                <option th:each="c : ${consumos}"
                        th:value="${c.idConsumo}"
                        th:text="${'ID: ' + c.idConsumo + ' - ' + c.lineaMovil.numTelefono}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-cash-coin"></i> Monto Cobrado *</label>
            <input type="number" th:field="*{montoCobrado}" class="form-control" step="0.01" min="0" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Detalle</button>
            <a href="/detalles-facturas" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
