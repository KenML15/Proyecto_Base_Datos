<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Lista de Clientes</h2>
        <a href="/customers/new" class="btn btn-primary">Registrar Nuevo Cliente</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Primer Apellido</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.firstName}"></td>
                <td th:text="${c.lastName1}"></td>
                <td th:text="${c.email}"></td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/customers/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/customers/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar a este cliente?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${customers.empty}">
                <td colspan="5" class="text-center">No hay clientes registrados actualmente.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
