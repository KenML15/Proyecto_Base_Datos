<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Lista de Clientes</h2>
<a href="/customers/new" class="btn btn-primary mb-3">Registrar Nuevo Cliente</a>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Correo</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${customers}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.firstName}"></td>
        <td th:text="${c.lastName1}"></td>
        <td th:text="${c.email}"></td>
        <td>
            <a th:href="@{/customers/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Editar</a>
            <a th:href="@{/customers/delete/{id}(id=${c.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Está seguro de eliminar este cliente?');">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
