<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clientes · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-people-fill"></i></span> Gestión de Clientes</h2>
            <p class="page-subtitle">Administra la información de los clientes registrados en la plataforma.</p>
        </div>
        <a href="/customers/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Registrar Nuevo Cliente</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Primer Apellido</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${customers}">
                    <td class="mono" th:text="${c.id}"></td>
                    <td th:text="${c.firstName}"></td>
                    <td th:text="${c.lastName1}"></td>
                    <td th:text="${c.email}"></td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/customers/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/customers/delete/{id}(id=${c.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar a este cliente?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${customers.empty}">
                    <td colspan="5">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay clientes registrados actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
