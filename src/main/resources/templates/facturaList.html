<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Facturas · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-receipt-fill"></i></span> Gestión de Facturas</h2>
            <p class="page-subtitle">Administra las facturas emitidas a los clientes.</p>
        </div>
        <a href="/facturas/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Factura</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Nº Factura</th>
                    <th>Cliente</th>
                    <th>Fecha Emisión</th>
                    <th>Monto Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f : ${facturas}">
                    <td class="mono" th:text="${f.numFactura}"></td>
                    <td th:text="${f.cliente.firstName + ' ' + f.cliente.lastName1}"></td>
                    <td class="mono" th:text="${#temporals.format(f.fechaEmision, 'dd/MM/yyyy')}"></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(f.montoTotal, 1, 2)}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${f.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${f.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/facturas/edit/{id}(id=${f.numFactura})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/facturas/delete/{id}(id=${f.numFactura})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta factura?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${facturas.empty}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay facturas registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
