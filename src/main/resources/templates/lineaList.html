<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Líneas Móviles · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-phone-fill"></i></span> Gestión de Líneas Móviles</h2>
            <p class="page-subtitle">Visualiza y administra todas las líneas telefónicas registradas.</p>
        </div>
        <a href="/lineas/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Línea</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Teléfono</th>
                    <th>Cliente</th>
                    <th>Tipo de Línea</th>
                    <th>Tecnología</th>
                    <th>Fecha Activación</th>
                    <th>Estado Línea</th>
                    <th>Tipo SIM</th>
                    <th>Estado Registro</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l : ${lineas}">
                    <td class="mono" th:text="${l.numTelefono}"></td>
                    <td th:text="${l.cliente.nombre + ' ' + l.cliente.apellido1}"></td>
                    <td><span class="chip chip-blue" th:text="${l.tipoLinea}"></span></td>
                    <td th:text="${l.tecnologia}"></td>
                    <td class="mono" th:text="${#temporals.format(l.fechaActivacion, 'dd/MM/yyyy')}"></td>
                    <td th:text="${l.estadoLinea}"></td>
                    <td th:text="${l.tipoSIM}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${l.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${l.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/lineas/edit/{id}(id=${l.numTelefono})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/lineas/delete/{id}(id=${l.numTelefono})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta línea?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${lineas.empty}">
                    <td colspan="9">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay líneas móviles registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
