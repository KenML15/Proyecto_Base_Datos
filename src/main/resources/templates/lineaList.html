<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Líneas Móviles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestión de Líneas Móviles</h2>
    <a href="/lineas/new" class="btn btn-primary">Nueva Línea</a>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-bordered shadow-sm">
      <thead class="table-dark">
      <tr>
        <th>Número de Teléfono</th>
        <th>Cliente</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="l : ${lineas}">
        <td th:text="${l.numeroTelefono}"></td>
        <td th:text="${l.customer.firstName + ' ' + l.customer.lastName1}"></td>
        <td>
                            <span th:classappend="${l.estado == 'A' ? 'badge bg-success' : 'badge bg-secondary'}"
                                  th:text="${l.estado == 'A' ? 'Activo' : 'Inactivo'}">
                            </span>
        </td>
        <td>
          <div class="btn-group" role="group">
            <a th:href="@{/lineas/edit/{id}(id=${l.numeroTelefono})}" class="btn btn-warning btn-sm">Editar</a>
            <a th:href="@{/lineas/delete/{id}(id=${l.numeroTelefono})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Está seguro de eliminar esta línea?');">Eliminar</a>
          </div>
        </td>
      </tr>
      <tr th:if="${lineas.empty}">
        <td colspan="4" class="text-center">No hay líneas móviles registradas.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
