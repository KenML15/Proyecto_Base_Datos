<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Contrato · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-file-earmark-text-fill"></i></span> Datos del Contrato</h2>
            <p class="page-subtitle">Asocia un cliente con un plan tarifario y define las condiciones del contrato.</p>
        </div>
    </div>

    <form th:action="@{/contratos/save}" th:object="${contrato}" method="post" class="l360-card form-card">

        <input type="hidden" th:field="*{numContrato}" />

        <div class="mb-3" th:if="${contrato.numContrato != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Nº de Contrato</label>
            <input type="text" th:value="${contrato.numContrato}" class="form-control" readonly disabled />
        </div>

        <div class="mb-3" th:if="${contrato.numContrato == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Nº de Contrato (Automático)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person"></i> Cliente *</label>
            <select th:field="*{cliente}" class="form-control" required>
                <option value="" disabled selected>Seleccione un cliente...</option>
                <option th:each="c : ${clientes}"
                        th:value="${c.id}"
                        th:text="${c.firstName + ' ' + c.lastName1 + ' (ID: ' + c.id + ')'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-grid-3x3-gap"></i> Plan Tarifario *</label>
            <select th:field="*{plan}" class="form-control" required>
                <option value="" disabled selected>Seleccione un plan...</option>
                <option th:each="p : ${planes}"
                        th:value="${p.id}"
                        th:text="${p.nombre + ' - $' + #numbers.formatDecimal(p.cuotaMensual, 1, 2)}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha de Firma *</label>
            <input type="date" th:field="*{fechaFirma}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-hourglass-split"></i> Plazo (Meses) *</label>
            <input type="number" th:field="*{plazoMeses}" class="form-control" min="1" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-exclamation-diamond"></i> Monto de Penalización ($) *</label>
            <input type="number" step="0.01" th:field="*{montoPenalizacion}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Contrato</button>
            <a href="/contratos" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
