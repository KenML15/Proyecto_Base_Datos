<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Registro de Plan Tarifario</h2>

<form th:action="@{/planes/save}" th:object="${plan}" method="post" class="card p-4 shadow-sm">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3" th:if="${plan.id != null}">
        <label class="form-label text-muted">ID del Plan</label>
        <input type="text" th:value="${plan.id}" class="form-control" readonly disabled />
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre del Plan *</label>
        <input type="text" th:field="*{nombre}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Cuota Mensual ($) *</label>
        <input type="number" step="0.01" th:field="*{cuotaMensual}" class="form-control" required/>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Gigabytes Incluidos *</label>
            <input type="number" th:field="*{gigabytes}" class="form-control" required/>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Minutos Incluidos *</label>
            <input type="number" th:field="*{minutos}" class="form-control" required/>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Mensajes Incluidos *</label>
            <input type="number" th:field="*{mensajes}" class="form-control" required/>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Costo por Exceso ($) *</label>
        <input type="number" step="0.01" th:field="*{costoExceso}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Categoría Plan *</label>
        <input type="number" th:field="*{codCategoria}" class="form-control" required/>
        <small class="form-text text-muted">ID de la categoría (ej: 1 para categoría básica)</small>
    </div>

    <div class="mb-3">
        <label class="form-label">Estado</label>
        <select th:field="*{status}" class="form-control" required>
            <option value="A">Activo</option>
            <option value="I">Inactivo</option>
        </select>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Guardar Plan</button>
        <a href="/planes" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
