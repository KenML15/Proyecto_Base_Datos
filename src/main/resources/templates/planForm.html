<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Plan · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span> Registro de Plan Tarifario</h2>
            <p class="page-subtitle">Define los beneficios, costos y categoría del plan.</p>
        </div>
    </div>

    <form th:action="@{/planes/save}" th:object="${plan}" method="post" class="l360-card form-card">
        <input type="hidden" th:field="*{codPlan}"/>

        <!-- MOSTRAR ID EN EDICIÓN -->
        <div class="mb-3" th:if="${plan.codPlan != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID del Plan</label>
            <input type="text" th:value="${plan.codPlan}" class="form-control" readonly disabled />
        </div>

        <!-- MOSTRAR ALERTA EN NUEVO REGISTRO -->
        <div class="mb-3" th:if="${plan.codPlan == null}">
            <div class="alert alert-info" role="alert">
                <i class="bi bi-info-circle"></i> El ID del plan se asignará automáticamente al guardar.
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-bookmark"></i> Nombre del Plan *</label>
            <input type="text" th:field="*{nombre}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-cash-coin"></i> Cuota Mensual ($) *</label>
            <input type="number" step="0.01" th:field="*{cuotaMensual}" class="form-control" required/>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-hdd-network"></i> Gigabytes Incluidos *</label>
                <input type="number" th:field="*{gigabytesIncluidos}" class="form-control" required/>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-telephone-outbound"></i> Minutos Incluidos *</label>
                <input type="number" th:field="*{minutosIncluidos}" class="form-control" required/>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label"><i class="bi bi-chat-dots"></i> Mensajes Incluidos *</label>
                <input type="number" th:field="*{mensajesIncluidos}" class="form-control" required/>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-exclamation-diamond"></i> Costo por Exceso ($) *</label>
            <input type="number" step="0.01" th:field="*{costoExceso}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-tags"></i> Categoría Plan *</label>
            <select th:field="*{codCategoria}" class="form-control" required>
                <option value="">-- Seleccione una categoría --</option>
                <option th:each="cat : ${categorias}" th:value="${cat.codCategoria}" th:text="${cat.descripcion}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Plan</button>
            <a href="/planes" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
