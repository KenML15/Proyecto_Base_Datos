<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Consumo · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-graph-up"></i></span> Datos del Consumo</h2>
            <p class="page-subtitle">Registra el consumo de una línea en un período específico.</p>
        </div>
    </div>

    <form th:action="@{/consumos/save}" th:object="${consumo}" method="post" class="l360-card form-card">

        <input type="hidden" th:field="*{idConsumo}" />

        <div class="mb-3" th:if="${consumo.idConsumo != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Consumo</label>
            <input type="text" th:value="${consumo.idConsumo}" class="form-control" readonly disabled />
        </div>

        <div class="mb-3" th:if="${consumo.idConsumo == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Consumo (Automático)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-sim-fill"></i> Línea Móvil *</label>
            <select th:field="*{lineaMovil}" class="form-control" required>
                <option value="" disabled selected>Seleccione una línea...</option>
                <option th:each="l : ${lineas}"
                        th:value="${l.numTelefono}"
                        th:text="${l.numTelefono + ' - ' + l.cliente.nombre + ' ' + l.cliente.apellido1}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-globe"></i> Ámbito *</label>
            <select th:field="*{ambito}" class="form-control" required>
                <option value="" disabled selected>Seleccione un ámbito...</option>
                <option th:each="a : ${ambitos}"
                        th:value="${a.codAmbito}"
                        th:text="${a.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-clock-history"></i> Franja Horaria *</label>
            <select th:field="*{franjaHoraria}" class="form-control" required>
                <option value="" disabled selected>Seleccione una franja...</option>
                <option th:each="f : ${franjas}"
                        th:value="${f.idFranja}"
                        th:text="${f.descripcion + ' (' + #temporals.format(f.horaInicio, 'HH:mm') + ' - ' + #temporals.format(f.horaFin, 'HH:mm') + ')'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha/Hora Inicio *</label>
            <input type="datetime-local" th:field="*{fechaHoraInicio}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha/Hora Fin *</label>
            <input type="datetime-local" th:field="*{fechaHoraFin}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-tag"></i> Tipo de Consumo *</label>
            <input type="text" th:field="*{tipoConsumo}" class="form-control" placeholder="Ej: Voz, Datos, SMS" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-graph-up"></i> Cantidad Consumida *</label>
            <input type="number" th:field="*{cantidadConsumida}" class="form-control" step="0.01" min="0" required/>
            <small class="form-text">En minutos, MB o SMS según el tipo</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-cash-coin"></i> Costo *</label>
            <input type="number" th:field="*{costo}" class="form-control" step="0.01" min="0" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Consumo</button>
            <a href="/consumos" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
