<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Ámbito · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-globe2"></i></span> Datos del Ámbito</h2>
            <p class="page-subtitle">Define el código y nombre del ámbito de cobertura o aplicación.</p>
        </div>
    </div>

    <form th:action="@{/ambitos/save}" th:object="${ambito}" method="post" class="l360-card form-card">

        <div class="mb-3" th:if="${ambito.code != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Código de Ámbito</label>
            <input type="text" th:value="${ambito.code}" class="form-control" readonly disabled />
            <input type="hidden" th:field="*{code}" />
        </div>

        <div class="mb-3" th:if="${ambito.code == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Código de Ámbito *</label>
            <input type="text" th:field="*{code}" class="form-control" required maxlength="10" placeholder="Ej: NAC, INT, LOC"/>
            <small class="form-text">Código corto y único que identifica el ámbito.</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Nombre *</label>
            <input type="text" th:field="*{name}" class="form-control" required placeholder="Ej: Nacional, Internacional, Local"/>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Ámbito</button>
            <a href="/ambitos" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
