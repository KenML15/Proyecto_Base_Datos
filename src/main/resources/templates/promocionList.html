<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Promociones · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-gift-fill"></i></span> Gestión de Promociones</h2>
            <p class="page-subtitle">Crea y administra promociones con descuentos para tus clientes.</p>
        </div>
        <a href="/promociones/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Promoción</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descuento</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${promociones}">
                    <td class="mono" th:text="${p.codPromocion}"></td>
                    <td th:text="${p.nombre}"></td>
                    <td><span class="chip chip-green"><i class="bi bi-percent"></i> <span th:text="${p.porcentajeDescuento + '%'}"></span></span></td>
                    <td class="mono" th:text="${#temporals.format(p.fechaInicio, 'dd/MM/yyyy')}"></td>
                    <td class="mono" th:text="${#temporals.format(p.fechaFin, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${p.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${p.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/promociones/edit/{id}(id=${p.codPromocion})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/promociones/delete/{id}(id=${p.codPromocion})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta promoción?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${promociones.empty}">
                    <td colspan="7">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay promociones registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
