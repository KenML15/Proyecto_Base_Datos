<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="alert alert-danger p-4" role="alert">
        <h4 class="alert-heading"><i class="bi bi-exclamation-triangle-fill"></i> ¡Ups! Algo salió mal</h4>
        <p th:text="${errorMessage}" class="mb-0 mt-2"></p>
    </div>
    <a href="/customers" class="btn btn-outline-secondary mt-3"><i class="bi bi-arrow-left"></i> Volver a la lista de clientes</a>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
