<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Promoción-Plan · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-link-45deg"></i></span> Datos de Promoción-Plan</h2>
            <p class="page-subtitle">Vincula una promoción a un plan tarifario.</p>
        </div>
    </div>

    <form th:action="@{/promociones-planes/save}" th:object="${promocionPlan}" method="post" class="l360-card form-card">

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-gift-fill"></i> Promoción *</label>
            <select th:field="*{promocion}" class="form-control" required>
                <option value="" disabled selected>Seleccione una promoción...</option>
                <option th:each="p : ${promociones}"
                        th:value="${p.codPromocion}"
                        th:text="${p.nombre + ' (' + p.porcentajeDescuento + '%)'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-grid-3x3-gap"></i> Plan Tarifario *</label>
            <select th:field="*{plan}" class="form-control" required>
                <option value="" disabled selected>Seleccione un plan...</option>
                <option th:each="pl : ${planes}"
                        th:value="${pl.codPlan}"
                        th:text="${pl.nombre + ' - $' + #numbers.formatDecimal(pl.cuotaMensual, 1, 2)}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Relación</button>
            <a href="/promociones-planes" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
