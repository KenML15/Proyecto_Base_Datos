<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Llamadas · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-telephone-fill"></i></span> Gestión de Llamadas</h2>
            <p class="page-subtitle">Visualiza y administra el registro detallado de llamadas.</p>
        </div>
        <a href="/llamadas/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Registrar Llamada</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID Consumo</th>
                    <th>Destino</th>
                    <th>Tipo</th>
                    <th>Costo</th>
                    <th>Fecha/Hora</th>
                    <th>Franja</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l : ${llamadas}">
                    <td class="mono" th:text="${l.idConsumo}"></td>
                    <td class="mono" th:text="${l.numeroDestino}"></td>
                    <td th:text="${l.tipoLlamada}"></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(l.costo, 1, 2)}"></td>
                    <td class="mono" th:text="${#temporals.format(l.fechaInicial, 'dd/MM/yyyy HH:mm')}"></td>
                    <td><span class="chip chip-purple"><i class="bi bi-clock"></i> <span th:text="${l.franjaHoraria.descripcion}"></span></span></td>
                    <td>
                        <span class="status-badge" th:classappend="${l.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${l.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/llamadas/edit/{id}(id=${l.idConsumo})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/llamadas/delete/{id}(id=${l.idConsumo})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta llamada?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${llamadas.empty}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay llamadas registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
