<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Planes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Gestión de Planes</h2>
<a href="/planes/new" class="btn btn-primary mb-3">Nuevo Plan</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cuota Mensual</th> <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="plan : ${planes}">
        <td th:text="${plan.id}"></td>
        <td th:text="${plan.nombre}"></td>
        <td th:text="${'$' + plan.cuotaMensual}"></td>
        <td th:text="${plan.status}"></td>
        <td>
            <a th:href="@{/planes/edit/{id}(id=${plan.id})}" class="btn btn-sm btn-warning">Editar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
