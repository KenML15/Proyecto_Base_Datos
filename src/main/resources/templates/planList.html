<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Planes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Planes Tarifarios</h2>
        <a href="/planes/new" class="btn btn-primary">Nuevo Plan</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Cuota Mensual</th>
                <th>GB / Min / Msg</th>
                <th>Costo Exceso</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plan : ${planes}">
                <td th:text="${plan.id}"></td>
                <td th:text="${plan.nombre}"></td>
                <td th:text="${plan.descripcion}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(plan.cuotaMensual, 1, 2)}"></td>
                <td th:text="${plan.gigabytes + ' / ' + plan.minutos + ' / ' + plan.mensajes}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(plan.costoExceso, 1, 2)}"></td>
                <td>
                    <span th:classappend="${plan.status == 'A' ? 'badge bg-success' : 'badge bg-secondary'}"
                          th:text="${plan.status == 'A' ? 'Activo' : 'Inactivo'}">
                    </span>
                </td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/planes/edit/{id}(id=${plan.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/planes/delete/{id}(id=${plan.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar este plan?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${planes.empty}">
                <td colspan="8" class="text-center">No hay planes registrados actualmente.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
