<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Planes Tarifarios · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span> Gestión de Planes Tarifarios</h2>
            <p class="page-subtitle">Configura los planes disponibles para los contratos de clientes.</p>
        </div>
        <a href="/planes/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nuevo Plan</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Cuota Mensual</th>
                    <th>GB / Min / Msg</th>
                    <th>Costo Exceso</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="plan : ${planes}">
                    <td class="mono" th:text="${plan.codPlan}"></td>
                    <td th:text="${plan.nombre}"></td>
                    <td th:text="${plan.descripcion}"></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(plan.cuotaMensual, 1, 2)}"></td>
                    <td><span class="chip chip-violet"><i class="bi bi-speedometer"></i> <span th:text="${plan.gigabytesIncluidos + ' / ' + plan.minutosIncluidos + ' / ' + plan.mensajesIncluidos}"></span></span></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(plan.costoExceso, 1, 2)}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${plan.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${plan.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/planes/edit/{id}(id=${plan.codPlan})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/planes/delete/{id}(id=${plan.codPlan})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este plan?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${planes.empty}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay planes registrados actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
