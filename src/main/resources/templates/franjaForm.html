<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Franja Horaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Datos de Franja Horaria</h2>

<form th:action="@{/franjas/save}" th:object="${franja}" method="post" class="card p-4 shadow-sm">

    <input type="hidden" th:field="*{idFranja}" />

    <div class="mb-3" th:if="${franja.idFranja != null}">
        <label class="form-label text-muted">ID de Franja</label>
        <input type="text" th:value="${franja.idFranja}" class="form-control" readonly disabled />
    </div>

    <div class="mb-3" th:if="${franja.idFranja == null}">
        <label class="form-label">ID de Franja (Automático)</label>
        <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
    </div>

    <div class="mb-3">
        <label class="form-label">Descripción *</label>
        <input type="text" th:field="*{descripcion}" class="form-control" required/>
        <small class="form-text text-muted">Ej: Horario Pico, Horario Valle, Horario Nocturno</small>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Hora Inicio (HH:mm) *</label>
            <input type="time" th:field="*{horaInicio}" class="form-control" required/>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Hora Fin (HH:mm) *</label>
            <input type="time" th:field="*{horaFin}" class="form-control" required/>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Días Aplicación *</label>
        <input type="text" th:field="*{diasAplicacion}" class="form-control" required/>
        <small class="form-text text-muted">Ej: L-V (Lunes-Viernes), S-D (Sábado-Domingo), Todos</small>
    </div>

    <div class="mb-3">
        <label class="form-label">Estado</label>
        <select th:field="*{status}" class="form-control" required>
            <option value="A">Activo</option>
            <option value="I">Inactivo</option>
        </select>
    </div>

    <div class="alert alert-info" role="alert">
        <strong>Nota:</strong> Las franjas horarias se utilizan para aplicar tarifas diferenciadas según la hora del día.
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Guardar Franja</button>
        <a href="/franjas" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
