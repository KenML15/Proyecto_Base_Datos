<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Franja Horaria · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-clock-history"></i></span> Datos de Franja Horaria</h2>
            <p class="page-subtitle">Configura el rango horario y los días en los que aplica.</p>
        </div>
    </div>

    <form th:action="@{/franjas/save}" th:object="${franja}" method="post" class="l360-card form-card">

        <input type="hidden" th:field="*{idFranja}" />

        <div class="mb-3" th:if="${franja.idFranja != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Franja</label>
            <input type="text" th:value="${franja.idFranja}" class="form-control" readonly disabled />
        </div>

        <div class="mb-3" th:if="${franja.idFranja == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> ID de Franja (Automático)</label>
            <input type="text" class="form-control" readonly value="Se asignará automáticamente" />
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text"></i> Descripción *</label>
            <input type="text" th:field="*{descripcion}" class="form-control" required/>
            <small class="form-text">Ej: Horario Pico, Horario Valle, Horario Nocturno</small>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-hourglass-split"></i> Hora Inicio (HH:mm) *</label>
                <input type="time" th:field="*{horaInicio}" class="form-control" required/>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-hourglass-bottom"></i> Hora Fin (HH:mm) *</label>
                <input type="time" th:field="*{horaFin}" class="form-control" required/>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar3"></i> Días Aplicación *</label>
            <input type="text" th:field="*{diasAplicacion}" class="form-control" required/>
            <small class="form-text">Ej: L-V (Lunes-Viernes), S-D (Sábado-Domingo), Todos</small>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="alert alert-info" role="alert">
            <i class="bi bi-info-circle"></i> Las franjas horarias se utilizan para aplicar tarifas diferenciadas según la hora del día.
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Franja</button>
            <a href="/franjas" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
