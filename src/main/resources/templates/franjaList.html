<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Franjas Horarias · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-clock-history"></i></span> Gestión de Franjas Horarias</h2>
            <p class="page-subtitle">Define los rangos horarios usados para tarifas diferenciadas.</p>
        </div>
        <a href="/franjas/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nueva Franja</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Hora Inicio</th>
                    <th>Hora Fin</th>
                    <th>Días Aplicación</th>
                    <th>Estado</th>
                    <th>Creado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="franja : ${franjas}">
                    <td class="mono" th:text="${franja.idFranja}"></td>
                    <td th:text="${franja.descripcion}"></td>
                    <td class="mono" th:text="${#temporals.format(franja.horaInicio, 'HH:mm')}"></td>
                    <td class="mono" th:text="${#temporals.format(franja.horaFin, 'HH:mm')}"></td>
                    <td><span class="chip"><i class="bi bi-calendar3"></i> <span th:text="${franja.diasAplicacion}"></span></span></td>
                    <td>
                        <span class="status-badge" th:classappend="${franja.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${franja.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td class="mono" th:text="${#temporals.format(franja.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/franjas/edit/{id}(id=${franja.idFranja})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/franjas/delete/{id}(id=${franja.idFranja})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar esta franja?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${franjas.empty}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay franjas horarias registradas actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
