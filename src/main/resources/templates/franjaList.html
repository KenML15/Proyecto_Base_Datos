<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Franjas Horarias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Franjas Horarias</h2>
        <a href="/franjas/new" class="btn btn-primary">Nueva Franja</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Hora Inicio</th>
                <th>Hora Fin</th>
                <th>Días Aplicación</th>
                <th>Estado</th>
                <th>Creado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="franja : ${franjas}">
                <td th:text="${franja.idFranja}"></td>
                <td th:text="${franja.descripcion}"></td>
                <td th:text="${#temporals.format(franja.horaInicio, 'HH:mm')}"></td>
                <td th:text="${#temporals.format(franja.horaFin, 'HH:mm')}"></td>
                <td th:text="${franja.diasAplicacion}"></td>
                <td>
                    <span th:classappend="${franja.status == 'A' ? 'badge bg-success' : 'badge bg-secondary'}"
                          th:text="${franja.status == 'A' ? 'Activo' : 'Inactivo'}">
                    </span>
                </td>
                <td th:text="${#temporals.format(franja.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/franjas/edit/{id}(id=${franja.idFranja})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/franjas/delete/{id}(id=${franja.idFranja})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar esta franja?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${franjas.empty}">
                <td colspan="8" class="text-center">No hay franjas horarias registradas actualmente.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
