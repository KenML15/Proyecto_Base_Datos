<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ámbitos · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-globe2"></i></span> Gestión de Ámbitos</h2>
            <p class="page-subtitle">Define los ámbitos de cobertura o aplicación usados en la plataforma.</p>
        </div>
        <a href="/ambitos/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nuevo Ámbito</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${ambitos}">
                    <td class="mono" th:text="${a.codAmbito}"></td>
                    <td th:text="${a.nombre}"></td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/ambitos/edit/{id}(id=${a.codAmbito})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/ambitos/delete/{id}(id=${a.codAmbito})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este ámbito?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${ambitos.empty}">
                    <td colspan="3">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay ámbitos registrados actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
