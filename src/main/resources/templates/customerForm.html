<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Datos del Cliente</h2>

<form th:action="@{/customers/save}" th:object="${customer}" method="post" class="card p-4 shadow-sm">

    <input type="hidden" th:field="*{id}" />

    <div class="mb-3" th:if="${customer.id != null}">
        <label class="form-label text-muted">ID de Sistema</label>
        <input type="text" th:value="${customer.id}" class="form-control" readonly disabled />
    </div>

    <div class="mb-3" th:if="${customer.id == null}">
        <label class="form-label">ID Cliente (Numérico)</label>
        <input type="number" th:field="*{id}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{firstName}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Primer Apellido</label>
        <input type="text" th:field="*{lastName1}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Segundo Apellido</label>
        <input type="text" th:field="*{lastName2}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" th:field="*{direccion}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" th:field="*{email}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha de Ingreso</label>
        <input type="date" th:field="*{fechaIngreso}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">Tipo de Cliente</label>
        <select th:field="*{customerType}" class="form-control" required>
            <option value="Regular">Regular</option>
            <option value="Empresarial">Empresarial</option>
            <option value="VIP">VIP</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Estado</label>
        <select th:field="*{status}" class="form-control" required>
            <option value="A">Activo</option>
            <option value="I">Inactivo</option>
        </select>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Guardar Cliente</button>
        <a href="/customers" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</form>
</body>
</html>
