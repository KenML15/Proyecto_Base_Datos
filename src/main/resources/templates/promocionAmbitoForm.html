<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Formulario de Promoción-Ámbito · Link360</title>
  <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
  <div class="page-header">
    <div>
      <h2><span class="page-header-icon"><i class="bi bi-link-45deg"></i></span> Datos de Promoción-Ámbito</h2>
      <p class="page-subtitle">Vincula una promoción a un ámbito de aplicación.</p>
    </div>
  </div>

  <form th:action="@{/promociones-ambitos/save}" th:object="${promocionAmbito}" method="post" class="l360-card form-card">

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-gift-fill"></i> Promoción *</label>
      <select th:field="*{promocion}" class="form-control" required>
        <option value="" disabled selected>Seleccione una promoción...</option>
        <option th:each="p : ${promociones}"
                th:value="${p.codPromocion}"
                th:text="${p.nombre + ' (' + p.porcentajeDescuento + '%)'}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-globe"></i> Ámbito *</label>
      <select th:field="*{ambito}" class="form-control" required>
        <option value="" disabled selected>Seleccione un ámbito...</option>
        <option th:each="a : ${ambitos}"
                th:value="${a.codAmbito}"
                th:text="${a.nombre}">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
      <select th:field="*{status}" class="form-control" required>
        <option value="A">Activo</option>
        <option value="I">Inactivo</option>
      </select>
    </div>

    <div class="d-grid gap-2 mt-4">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Relación</button>
      <a href="/promociones-ambitos" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
    </div>
  </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
