<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Línea Móvil · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page l360-page-narrow">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-phone-fill"></i></span> Datos de Línea Móvil</h2>
            <p class="page-subtitle">Registra una nueva línea móvil para un cliente.</p>
        </div>
    </div>

    <form th:action="@{/lineas/save}" th:object="${lineaMovil}" method="post" class="l360-card form-card">

        <div class="mb-3" th:if="${lineaMovil.numTelefono != null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Número de Teléfono</label>
            <input type="text" th:value="${lineaMovil.numTelefono}" class="form-control" readonly disabled />
            <input type="hidden" th:field="*{numTelefono}" />
        </div>

        <div class="mb-3" th:if="${lineaMovil.numTelefono == null}">
            <label class="form-label"><i class="bi bi-fingerprint"></i> Número de Teléfono *</label>
            <input type="text" th:field="*{numTelefono}" class="form-control" maxlength="15" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person"></i> Cliente *</label>
            <select th:field="*{cliente}" class="form-control" required>
                <option value="" disabled selected>Seleccione un cliente...</option>
                <option th:each="c : ${clientes}"
                        th:value="${c.idCliente}"
                        th:text="${c.nombre + ' ' + c.apellido1 + ' (ID: ' + c.idCliente + ')'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-tag"></i> Tipo de Línea *</label>
            <input type="text" th:field="*{tipoLinea}" class="form-control" placeholder="Ej: Prepago, Pospago" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-broadcast"></i> Tecnología *</label>
            <input type="text" th:field="*{tecnologia}" class="form-control" placeholder="Ej: 4G, 5G" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event"></i> Fecha de Activación</label>
            <input type="date" th:field="*{fechaActivacion}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado de Línea *</label>
            <input type="text" th:field="*{estadoLinea}" class="form-control" placeholder="Ej: Activa, Suspendida" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-sim"></i> Tipo de SIM *</label>
            <input type="text" th:field="*{tipoSIM}" class="form-control" placeholder="Ej: Física, eSIM" required/>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-toggle-on"></i> Estado</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="A">Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar Línea Móvil</button>
            <a href="/lineas" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
