<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registrar Línea Móvil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Nueva Línea Móvil</h2>

<form th:action="@{/lineas/save}" th:object="${linea}" method="post" class="card p-4 shadow-sm">

  <div class="mb-3">
    <label class="form-label">Número de Teléfono</label>
    <input type="text" th:field="*{numeroTelefono}" class="form-control" required placeholder="Ej: 8888-8888"/>
  </div>

  <div class="mb-3">
    <label class="form-label">Cliente Asignado</label>
    <select th:field="*{customer.id}" class="form-control" required>
      <option value="" disabled selected>Seleccione un cliente...</option>
      <option th:each="c : ${customers}"
              th:value="${c.id}"
              th:text="${c.firstName + ' ' + c.lastName1}">
      </option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Estado</label>
    <select th:field="*{estado}" class="form-control" required>
      <option value="A">Activo</option>
      <option value="I">Inactivo</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo de Línea</label>
    <select th:field="*{tipoLinea}" class="form-control" required>
      <option value="Prepago">Prepago</option>
      <option value="Postpago">Postpago</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Fecha de Activación</label>
    <input type="date" th:field="*{fechaActivacion}" class="form-control" required/>
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo de SIM</label>
    <select th:field="*{tipoSIM}" class="form-control" required>
      <option value="Fisica">Física</option>
      <option value="eSIM">eSIM</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Tecnología</label>
    <input type="text" th:field="*{tecnologia}" class="form-control" required placeholder="Ej: 5G"/>
  </div>

  <div class="d-grid gap-2">
    <button type="submit" class="btn btn-success">Guardar Línea</button>
    <a href="/lineas" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>
</body>
</html>
