<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalles de Facturas · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-list-check"></i></span> Gestión de Detalles de Facturas</h2>
            <p class="page-subtitle">Administra los detalles (líneas) de cada factura.</p>
        </div>
        <a href="/detalles-facturas/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nuevo Detalle</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Nº Factura</th>
                    <th>Línea Detalle</th>
                    <th>Consumo</th>
                    <th>Monto Cobrado</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${detalles}">
                    <td class="mono" th:text="${d.factura.numFactura}"></td>
                    <td class="mono" th:text="${d.idLineaDetalle}"></td>
                    <td class="mono" th:text="${d.consumo.idConsumo}"></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(d.montoCobrado, 1, 2)}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${d.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${d.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/detalles-facturas/edit/{numFactura}/{idLinea}(numFactura=${d.factura.numFactura}, idLinea=${d.idLineaDetalle})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/detalles-facturas/delete/{numFactura}/{idLinea}(numFactura=${d.factura.numFactura}, idLinea=${d.idLineaDetalle})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este detalle?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${detalles.empty}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay detalles de facturas registrados actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
