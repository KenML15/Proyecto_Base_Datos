<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="headAssets">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script>
        (function () {
            var saved = localStorage.getItem('link360-theme');
            var theme = saved === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.documentElement.setAttribute('data-theme', theme);
        })();

        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-bs-theme') === 'light' ? 'light' : 'dark';
            var next = current === 'light' ? 'dark' : 'light';

            html.setAttribute('data-bs-theme', next);
            html.setAttribute('data-theme', next);
            localStorage.setItem('link360-theme', next);

            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            var icon = document.getElementById('themeToggleIcon');
            if (icon) {
                // Si el tema es claro, el botón debe mostrar una LUNA para cambiar a oscuro.
                // Si el tema es oscuro, el botón debe mostrar un SOL para cambiar a claro.
                icon.className = theme === 'light' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            }
        }

        // Sincroniza el icono correctamente en cuanto el HTML esté listo
        document.addEventListener('DOMContentLoaded', function() {
            var currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'dark';
            updateThemeIcon(currentTheme);
        });
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{~/CSS/style.css}">
</th:block>

                    <path d="M6.5 14.5c2.7-2.7 8.3-2.7 11 0" stroke="#06121c" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="18.2" r="1.6" fill="#06121c"/>

                </li>
                <li class="nav-item">
                    <a class="nav-link l360-nav-link" href="/lineas"><i class="bi bi-sim"></i> Líneas Móviles</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link l360-nav-link" href="/categorias"><i class="bi bi-tags"></i> Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link l360-nav-link" href="/franjas"><i class="bi bi-clock-history"></i> Franjas Horarias</a>
                </li>
                <li class="nav-item">

                </li>
                <li class="nav-item">
                    <a class="nav-link l360-nav-link" href="/contratos"><i class="bi bi-file-earmark-text"></i> Contratos</a>
                </li>

                <li class="nav-item ms-lg-2 d-flex align-items-center">
                    <button type="button" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Cambiar tema claro/oscuro" title="Cambiar tema claro/oscuro">
                        <i id="themeToggleIcon" class="bi bi-sun-fill"></i>
                    </button>
