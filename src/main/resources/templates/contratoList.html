<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contratos · Link360</title>
    <th:block th:replace="~{fragments :: headAssets}"></th:block>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container l360-page">
    <div class="page-header">
        <div>
            <h2><span class="page-header-icon"><i class="bi bi-file-earmark-text-fill"></i></span> Gestión de Contratos</h2>
            <p class="page-subtitle">Vincula clientes con planes tarifarios y condiciones contractuales.</p>
        </div>
        <a href="/contratos/new" class="btn btn-l360-primary"><i class="bi bi-plus-lg"></i> Nuevo Contrato</a>
    </div>

    <div class="l360-card table-card">
        <div class="table-responsive">
            <table class="table table-hover l360-table">
                <thead>
                <tr>
                    <th>Nº Contrato</th>
                    <th>Cliente</th>
                    <th>Plan</th>
                    <th>Fecha Firma</th>
                    <th>Plazo (meses)</th>
                    <th>Penalización</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${contratos}">
                    <td class="mono" th:text="${c.numContrato}"></td>
                    <td th:text="${c.cliente.nombre + ' ' + c.cliente.apellido1}"></td>
                    <td><span class="chip chip-cyan"><i class="bi bi-grid-3x3-gap"></i> <span th:text="${c.plan.nombre}"></span></span></td>
                    <td class="mono" th:text="${#temporals.format(c.fechaFirma, 'dd/MM/yyyy')}"></td>
                    <td th:text="${c.plazoMeses}"></td>
                    <td class="mono" th:text="${'$' + #numbers.formatDecimal(c.montoPenalizacion, 1, 2)}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${c.status == 'A' ? 'status-active' : 'status-inactive'}">
                            <i class="bi bi-circle-fill"></i>
                            <span th:text="${c.status == 'A' ? 'Activo' : 'Inactivo'}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/contratos/edit/{id}(id=${c.numContrato})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil-fill"></i> Editar</a>
                            <a th:href="@{/contratos/delete/{id}(id=${c.numContrato})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este contrato?');"><i class="bi bi-trash-fill"></i> Eliminar</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${contratos.empty}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            No hay contratos registrados actualmente.
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
