<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Contratos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Contratos</h2>
        <a href="/contratos/new" class="btn btn-primary">Nuevo Contrato</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered shadow-sm">
            <thead class="table-dark">
            <tr>
                <th>Nº Contrato</th>
                <th>Cliente</th>
                <th>Plan</th>
                <th>Fecha Firma</th>
                <th>Plazo (meses)</th>
                <th>Penalización</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${contratos}">
                <td th:text="${c.numContrato}"></td>
                <td th:text="${c.cliente.firstName + ' ' + c.cliente.lastName1}"></td>
                <td th:text="${c.plan.nombre}"></td>
                <td th:text="${#temporals.format(c.fechaFirma, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.plazoMeses}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(c.montoPenalizacion, 1, 2)}"></td>
                <td>
                    <span th:classappend="${c.status == 'A' ? 'badge bg-success' : 'badge bg-secondary'}"
                          th:text="${c.status == 'A' ? 'Activo' : 'Inactivo'}">
                    </span>
                </td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/contratos/edit/{id}(id=${c.numContrato})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/contratos/delete/{id}(id=${c.numContrato})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Está seguro de eliminar este contrato?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${contratos.empty}">
                <td colspan="8" class="text-center">No hay contratos registrados actualmente.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
